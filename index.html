<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Construção</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            color: #cbd5e1;
            margin-bottom: 30px;
        }

        .emoji {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .loader {
            width: 70px;
            height: 70px;
            border: 6px solid rgba(255,255,255,0.2);
            border-top: 6px solid #38bdf8;
            border-radius: 50%;
            margin: auto;
            animation: girar 1s linear infinite;
        }

        @keyframes girar {
            100% {
                transform: rotate(360deg);
            }
        }

        footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="emoji">🚧</div>

        <h1>EM CONSTRUÇÃO</h1>

        <p>
            Estamos trabalhando para trazer novidades em breve.<br>
            Volte em alguns dias.
        </p>

        <div class="loader"></div>

        <footer>
            &copy; 2026 - Todos os direitos reservados.
        </footer>
    </div>

</body>
</html>
